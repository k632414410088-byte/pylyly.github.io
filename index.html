<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Intro — CHOOSE YOUR HERO</title>

  <!-- Round / slightly gamey font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #07060a;
      --accent: #e11d48;
      --muted: #b7c3cf;
      --button-red: #e11d48;
      --card-width: 460px;
      --card-media-height: 420px;
    }

    html,body{height:100%;margin:0;font-family:'Poppins',system-ui,Arial; background:var(--bg); color:#fff; -webkit-font-smoothing:antialiased}

    /* ---------- Intro (video only) ---------- */
    .intro-stage{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#000;
      z-index:60;
      transition:opacity 2s ease;
    }
    .intro-stage.hidden{ opacity:0; pointer-events:none; }

    .intro-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      background:#000;
    }

    /* big centered play overlay (shows only if autoplay blocked) */
    .play-overlay{
      position:absolute;
      z-index:70;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:auto;
    }
    .play-btn{
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.08);
      color: #fff;
      padding: 18px 26px;
      border-radius: 12px;
      font-weight:800;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
    }

    /* ---------- Selection overlay ---------- */
    .selection-overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(2,6,23,0.88), rgba(2,6,23,0.96));
      z-index:10;
      opacity:0;
      pointer-events:none;
      transition:opacity 1.8s ease;
      padding:40px;
    }
    .selection-overlay.visible{ opacity:1; pointer-events:auto; }

    .selection-inner{ max-width:1200px; width:100%; text-align:center; padding-top:10px; } /* small padding so title drops down a bit */

    .selection-title{
      font-size:36px;
      color:var(--muted);
      letter-spacing:6px;
      margin-bottom:28px;
      margin-top:12px; /* moved down a bit as requested */
      font-weight:800;
    }

    .cards{
      display:flex;
      gap:28px;
      justify-content:center;
      align-items:stretch;
      flex-wrap:wrap;
    }

    .card{
      width:var(--card-width);
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:18px;
      padding:18px;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      box-shadow:0 12px 40px rgba(2,6,23,0.6);
      transition:box-shadow .28s ease;
      cursor:pointer;
      overflow:visible;
    }
    .card:hover{ box-shadow:0 20px 60px rgba(0,0,0,0.6); }

    /* enforce 3:4 crop region but provide fallback height */
    .card-media{
      width:100%;
      aspect-ratio:3/4;
      height:var(--card-media-height);
      display:block;
      overflow:hidden;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(0,0,0,0.06), rgba(255,255,255,0.01));
    }

    .card-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:50% 50%;
      display:block;
      filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
      transition:none; /* no scale/zoom */
    }

    /* adjust PYLYLY portrait so face sits higher (tune as needed) */
    .card-pylyly .card-media img{ object-position:50% 22%; }

    /* Iron Man center */
    .card-iron .card-media img{ object-position:50% 50%; }

    .card-body{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex:0 0 auto;
    }

    .card h3{
      margin:0;
      font-size:20px;
      font-weight:800;
      letter-spacing:2px;
      color:#fff;
    }

    .card .card-btn{
      background:#000;
      color:var(--button-red);
      border:2px solid rgba(255,255,255,0.04);
      padding:12px 18px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      font-size:14px;
    }
    .card .card-btn:active{ transform:translateY(2px); }
    .card .card-btn:focus{ outline:2px solid rgba(225,29,72,0.14); }

    /* cinematic overlay */
    .cinematic{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:40;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.85));
      opacity:0;
      transition:opacity .18s ease;
    }
    .cinematic.visible{ opacity:1; pointer-events:auto; }

    .cinematic-text{
      color:#fff;
      font-size:30px;
      letter-spacing:2px;
      text-transform:uppercase;
      text-align:center;
      padding:20px 28px;
      border-radius:12px;
      background:rgba(0,0,0,0.28);
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
      font-weight:800;
    }

    /* final screen */
    .final-screen{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:30;
      opacity:0;
      pointer-events:none;
      transition:opacity .45s ease;
      background:linear-gradient(180deg, rgba(2,6,23,0.7), rgba(2,6,23,0.95));
      color:#fff;
      text-align:center;
      padding:24px;
    }
    .final-screen.show{ opacity:1; pointer-events:auto; }
    .final-inner h2{ font-size:36px; margin:0 0 12px 0; letter-spacing:4px }
    .final-inner p{ margin:0; color:var(--muted) }

    @media (max-width:980px){
      .cards{ flex-direction:column; gap:18px; align-items:center; }
      .card{ width:92%; }
      .card-media{ height:320px; aspect-ratio:3/4; }
      .card-pylyly .card-media img{ object-position:50% 20%; }
    }
  </style>
</head>
<body>

  <!-- Intro stage (video only). If autoplay blocked, show play overlay. -->
  <div id="introStage" class="intro-stage" aria-hidden="false">
    <video id="introVideo" class="intro-video" autoplay muted playsinline>
      <source src="YTDown.com_YouTube_Marvel-Comics-Intro_Media_Ok5PXdmQV-s_001_1080p.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div id="playOverlay" class="play-overlay" style="display:none;">
      <button id="playBtn" class="play-btn" aria-label="Play intro">PLAY INTRO</button>
    </div>
  </div>

  <!-- Selection overlay (hidden until intro completes) -->
  <div id="selection" class="selection-overlay" aria-hidden="true" style="display:none;">
    <div class="selection-inner">
      <div class="selection-title">CHOOSE YOUR HERO</div>

      <div class="cards" role="list">
        <!-- IRON MAN -->
        <div class="card card-iron" role="listitem" id="cardIron" data-hero="iron" tabindex="0" aria-label="Iron Man">
          <div class="card-media">
            <img src="Iron_Man.jpg" alt="Iron Man">
          </div>
          <div class="card-body">
            <h3>IRON MAN</h3>
            <button class="card-btn" id="selectIron">SELECT HERO</button>
          </div>
        </div>

        <!-- PYLYLY -->
        <div class="card card-pylyly" role="listitem" id="cardPy" data-hero="pylyly" tabindex="0" aria-label="Pylyly">
          <div class="card-media">
            <img src="pll.jpg" alt="PYLYLY portrait">
          </div>
          <div class="card-body">
            <h3>PYLYLY</h3>
            <button class="card-btn" id="selectPy">SELECT HERO</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Cinematic messages -->
  <div id="cinematic" class="cinematic" aria-hidden="true" style="display:none;">
    <div class="cinematic-text" id="cineText"></div>
  </div>

  <!-- Final placeholder -->
  <div id="finalScreen" class="final-screen" aria-hidden="true" style="display:none;">
    <div class="final-inner">
      <h2 id="finalTitle"></h2>
      <p id="finalSubtitle"></p>
    </div>
  </div>

  <script>
    (function(){
      const introVideo = document.getElementById('introVideo');
      const introStage = document.getElementById('introStage');
      const selection = document.getElementById('selection');

      const playOverlay = document.getElementById('playOverlay');
      const playBtn = document.getElementById('playBtn');

      const selectPy = document.getElementById('selectPy');
      const selectIron = document.getElementById('selectIron');

      const cinematic = document.getElementById('cinematic');
      const cineText = document.getElementById('cineText');
      const finalScreen = document.getElementById('finalScreen');
      const finalTitle = document.getElementById('finalTitle');
      const finalSubtitle = document.getElementById('finalSubtitle');

      // Try to autoplay; if blocked, show play overlay and wait for user interaction.
      function tryAutoplay(){
        introVideo.play().then(()=>{
          // autoplay worked — hide overlay just in case
          playOverlay.style.display = 'none';
        }).catch(()=> {
          // autoplay blocked — show big play button, do NOT auto-skip
          playOverlay.style.display = 'flex';
        });
      }

      // When user clicks play
      playBtn.addEventListener('click', ()=> {
        playOverlay.style.display = 'none';
        introVideo.play().catch(()=>{ /* ignore */ });
      });

      // If video plays (via autoplay or user), ensure overlay hidden
      introVideo.addEventListener('play', ()=> {
        playOverlay.style.display = 'none';
      });

      // When video ends -> fade intro out (2s), then fade selection in
      introVideo.addEventListener('ended', () => {
        introStage.classList.add('hidden'); // fade out (2s)
        setTimeout(()=> {
          introStage.style.display = 'none';
          selection.style.display = 'flex';
          requestAnimationFrame(()=> {
            selection.classList.add('visible');
            selection.setAttribute('aria-hidden','false');
          });
        }, 2000);
      });

      // If video metadata loads, attempt autoplay
      if (introVideo.readyState >= 2) {
        tryAutoplay();
      } else {
        introVideo.addEventListener('loadedmetadata', tryAutoplay);
        // Also attempt after a small delay
        setTimeout(tryAutoplay, 1200);
      }

      // cinematic helper
      function playCinematic(messages, interval = 2500){
        cinematic.style.display = 'flex';
        cinematic.classList.add('visible');
        cinematic.setAttribute('aria-hidden','false');
        let i = 0;
        cineText.textContent = '';
        function next(){
          if(i >= messages.length){
            cinematic.classList.remove('visible');
            setTimeout(()=> { cinematic.style.display = 'none'; cinematic.setAttribute('aria-hidden','true'); }, 300);
            return;
          }
          cineText.style.opacity = '0';
          setTimeout(()=> {
            cineText.textContent = messages[i];
            cineText.style.transition = 'opacity .18s ease';
            cineText.style.opacity = '1';
            i++;
            setTimeout(next, interval);
          }, 160);
        }
        next();
      }

      function showFinal(name){
        finalTitle.textContent = name.toUpperCase();
        finalSubtitle.textContent = (name.toLowerCase() === 'pylyly') ? 'THE SELECTED HERO' : 'ALTERNATE HERO';
        finalScreen.style.display = 'flex';
        requestAnimationFrame(()=> { finalScreen.classList.add('show'); finalScreen.setAttribute('aria-hidden','false'); });
      }

      // select handlers
      selectPy.addEventListener('click', ()=> {
        selection.classList.remove('visible');
        setTimeout(()=> { selection.style.display = 'none'; showFinal('Pylyly'); }, 420);
      });

      selectIron.addEventListener('click', ()=> {
        const msgs = [
          'IRON MAN SELECTED',
          'Checking availability...',
          "Tony Stark is currently unavailable.",
          'IRON MAN WILL RETURN.',
          "BUT TODAY'S HERO IS...",
          'PYLYLY'
        ];
        selection.classList.remove('visible');
        setTimeout(()=> { selection.style.display='none'; playCinematic(msgs, 2500); }, 420);
        const total = msgs.length * 2500 + 400;
        setTimeout(()=> { showFinal('Pylyly'); }, total);
      });

      // keyboard access
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('keydown', (e) => {
          if(e.key === 'Enter' || e.key === ' '){
            const hero = card.getAttribute('data-hero');
            if(hero === 'pylyly') selectPy.click();
            else selectIron.click();
          }
        });
      });

    })();
  </script>

</body>
</html>
