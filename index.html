<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Intro — CHOOSE YOUR HERO</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07060a;
      --accent:#e11d48;
      --muted:#b7c3cf;
      --button-red:#e11d48;
    }
    html,body{height:100%;margin:0;font-family:'Poppins',system-ui,Arial; background:var(--bg); color:#fff; -webkit-font-smoothing:antialiased}

    /* -------- Intro stage (video only) -------- */
    .intro-stage{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden;
      background:#000; z-index:60;
      transition:opacity 2s ease;
    }
    .intro-stage.hidden{ opacity:0; pointer-events:none; }

    .intro-video{
      position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0;
      background:#000;
    }

    /* -------- Selection (cards) -------- */
    .selection-overlay{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(180deg, rgba(2,6,23,0.88), rgba(2,6,23,0.96));
      z-index:10; opacity:0; pointer-events:none; transition:opacity 2s ease; padding:40px;
    }
    .selection-overlay.visible{ opacity:1; pointer-events:auto; }

    .selection-inner{ max-width:1100px; width:100%; text-align:center; }
    .selection-title{ font-size:36px; color:var(--muted); letter-spacing:6px; margin-bottom:28px; font-weight:800 }

    .cards{ display:flex; gap:28px; justify-content:center; align-items:stretch; }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:18px; padding:18px; width:460px; display:flex; flex-direction:column; align-items:center;
      box-shadow:0 12px 40px rgba(2,6,23,0.6); transition:transform .28s ease, box-shadow .28s ease;
      cursor:pointer;
    }
    .card:hover{ transform:translateY(-10px); box-shadow:0 30px 80px rgba(0,0,0,0.6) }

    /* card media: enforce 3:4 crop so both portraits match */
    .card-media{ width:100%; aspect-ratio:3/4; display:flex; align-items:center; justify-content:center; overflow:hidden; border-radius:12px; background:linear-gradient(180deg, rgba(0,0,0,0.12), rgba(255,255,255,0.02)); }
    .card-media img{
      width:100%; height:100%; object-fit:cover; display:block; /* cover ensures cropping to fill 3:4 */
      filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    }
    /* adjust pylyly crop (shift up) so face is closer to top like Iron Man */
    .card-pylyly .card-media img{ object-position:50% 22%; } /* tweak 22% to move image up/down */

    /* iron man center */
    .card-iron .card-media img{ object-position:50% 50%; }

    .card-body{ margin-top:14px; display:flex; align-items:center; justify-content:space-between; width:100%; gap:12px }
    .card h3{ margin:0; font-size:20px; font-weight:800; letter-spacing:2px }
    .card .card-btn{
      background:#000; color:var(--button-red); border:2px solid rgba(255,255,255,0.04); padding:12px 18px; border-radius:12px; font-weight:800; cursor:pointer; font-size:14px;
    }

    /* cinematic overlay */
    .cinematic{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:40; pointer-events:none; background:linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.85)); opacity:0; transition:opacity .18s ease; }
