/* ==========================================
   HIỆU ỨNG PHÁT SÁNG BLINK BLINK (NEON PULSE)
   ========================================== */

/* 1. Animation nhấp nháy phát sáng cho Tên */
@keyframes textBlinkGlow {
  0%, 100% {
    text-shadow: 
      0 0 10px #ffffff,
      0 0 20px #e11d48,
      0 0 40px #e11d48,
      0 0 70px #ff2a5f;
    opacity: 1;
  }
  50% {
    text-shadow: 
      0 0 3px #ffffff,
      0 0 8px #e11d48,
      0 0 15px #e11d48;
    opacity: 0.85;
  }
}

/* 2. Animation nhấp nháy phát sáng cho Viền Khung Ảnh */

@keyframes borderBlinkGlow {
  0%, 100% {
    border-color: #ffffff !important;
    box-shadow: 
      0 0 20px #ffffff,
      0 0 35px #e11d48,
      0 0 70px #e11d48,
      inset 0 0 15px #e11d48 !important;
  }
  50% {
    border-color: rgba(255, 255, 255, 0.5) !important;
    box-shadow: 
      0 0 8px rgba(255,255,255,0.3),
      0 0 15px rgba(225,29,72,0.4) !important;
  }
}

/* Áp dụng vào đúng Class trong HTML của bạn */
  
.portfolio-name {
  animation: textBlinkGlow 1.4s infinite ease-in-out !important;
}
.profile-image-wrapper {
  animation: borderBlinkGlow 1.4s infinite ease-in-out !important;
}
    
/* 1. XÓA BỎ HOÀN TOÀN MỌI LỚP NỀN TỐI & MỜ (Bật nền vũ trụ xuyên suốt) */

}

/* 2. TĂNG RỰC RỠ ĐỘ SÁNG & GHIM BACKGROUND CHẶT VÀO MÀN HÌNH */
video, canvas, #bgVideo, .bg-video, .background-video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;

  z-index: -99999 !important; /* Đẩy sâu ra đằng sau */
  filter: brightness(1.5) contrast(1.1) blur(0px) !important; /* Tăng sáng rực rỡ */
  opacity: 1 !important;
}

/* 3. SỬA LỖI CUỘN: Cho phép toàn trang cuộn tự do trên nền cố định */
html, body {
  min-height: 100vh !important;
  height: auto !important;
  overflow-x: hidden !important;
  overflow-y: auto !important;
}

#portfolioScreen, .portfolio-screen {
  height: auto !important;

}

#portfolioScreen, .portfolio-screen {

}

    /* 1. Tăng độ sáng tối đa và bỏ mờ cho Video / Ảnh Background */
video, 
#bgVideo, 
.bg-video, 
.background-video {
  filter: brightness(1.1) contrast(1) blur(0px) !important; /* Tăng sáng & xóa mờ */

}

/* 2. Bỏ lớp mờ (blur) và làm trong suốt lớp phủ tối (Overlay) */
.overlay,

.portfolio-screen,
#portfolioScreen {

}

/* Dán đoạn này vào cuối thẻ <style> là xong ngay */
.cinematic {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100vh;
  background: #07060a !important;
  display: flex;
  align-items: center;
  justify-content: center;

.cinematic.visible {

@keyframes pulseGlow {
  from {
    opacity: 0.85;
    text-shadow: 0 0 10px #e11d48, 0 0 20px #e11d48, 0 0 30px #e11d48;
  }
  to {

  }

 /* Fix 2: Đảm bảo viền ảnh portfolio vẫn blink (đặt ở cuối để không bị ghi đè) */

    .stats-highlights {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 36px;
      width: 1092px; /* 3 * 340px + 2 * 36px = 1092px */
      max-width: calc(100% - 40px);
      margin: 0 auto;
      box-sizing: border-box;

      /* Strongly reset any stray positioning */
      position: static !important;
      left: auto !important;
      right: auto !important;
      transform: none !important;
      padding: 0 !important;
    }

    .stat-box {
      flex: 0 0 340px;
      width: 340px;
      height: 300px;
      box-sizing: border-box;
      position: relative;
      display: flex;
      flex-direction: column;

    @media (max-width:820px) {
      .stats-highlights { width: 100%; flex-wrap: wrap; gap: 20px; justify-content: center; }
      .stat-box { flex: 0 0 320px; width: 320px; height: 260px; margin-bottom: 8px; }
      .stat-box .big { font-size: 44px; }
    }
    @media (max-width:520px) {
      .stat-box { flex: 0 0 92%; width: 92%; max-width: 420px; height: 220px; }
      .stat-box .big { font-size: 36px; }
      .stats-inner { padding: 20px 12px; }
    }

  /* Tăng kích cỡ chữ trong stat boxes */
.stat-box .big {
  /* tăng tối đa lên, nhưng vẫn responsive */
  font-size: clamp(44px, 7vw, 68px) !important;
  line-height: 1;
  transform: translateY(-6px);
}

.stat-box .big sup {
  font-size: .38em;
  margin-left: 8px;
}

/* label nhỏ dưới số */
.stat-box .label {
  font-size: 16px !important;
  font-weight: 900;
  letter-spacing: 1px;
  margin-top: 8px;
}

/* badge (top-right) hơi to hơn */
.stat-box .badge {
  font-size: 12px !important;
  padding: 7px 12px !important;
}

/* Nếu muốn tăng chút khoảng cách giữa số và label (tuỳ chọn) */
.stat-box { gap: 12px !important; }

/* Điều chỉnh responsive nhỏ */
@media (max-width: 1120px) {
  .stat-box .big { font-size: clamp(38px, 8vw, 56px) !important; }
  .stat-box .label { font-size: 15px !important; }
}
@media (max-width: 520px) {
  .stat-box .big { font-size: clamp(28px, 10vw, 40px) !important; }
  .stat-box .label { font-size: 14px !important; }
}

<script>
(function(){
  const introVideo = document.getElementById('introVideo');
  const introStage = document.getElementById('introStage');
  const selection = document.getElementById('selection');

  const playOverlay = document.getElementById('playOverlay');
  const playBtn = document.getElementById('playBtn');

  const selectPy = document.getElementById('selectPy');
  const selectIron = document.getElementById('selectIron');

  const cinematic = document.getElementById('cinematic');
  const cineText = document.getElementById('cineText');
  // final screen removed

  const portfolioScreen = document.getElementById('portfolioScreen');
  const portfolioBgVideo = document.getElementById('portfolioBgVideo');

  // Try to autoplay; if blocked, show play overlay and wait for user interaction.
  function tryAutoplay(){
    introVideo.play().then(()=>{
      playOverlay.style.display = 'none';
    }).catch(()=> {
      playOverlay.style.display = 'flex';
    });
  }

  // When user clicks play
  playBtn.addEventListener('click', ()=> {
    playOverlay.style.display = 'none';
    introVideo.play().catch(()=>{ /* ignore */ });
  });

  // If video plays (via autoplay or user), ensure overlay hidden
  introVideo.addEventListener('play', ()=> {
    playOverlay.style.display = 'none';
  });

  // When video ends -> fade intro out (2s), then fade selection in
  introVideo.addEventListener('ended', () => {
    introStage.classList.add('hidden');
    setTimeout(()=> {
      introStage.style.display = 'none';
      selection.style.display = 'flex';
      requestAnimationFrame(()=> {
        selection.classList.add('visible');
        selection.setAttribute('aria-hidden','false');
      });
    }, 2000);
  });

  // If video metadata loads, attempt autoplay
  if (introVideo.readyState >= 2) {
    tryAutoplay();
  } else {
    introVideo.addEventListener('loadedmetadata', tryAutoplay);
    setTimeout(tryAutoplay, 1200);
  }

  // cinematic helper
  function playCinematic(messages, interval = 2500){
    cinematic.style.display = 'flex';
    cinematic.classList.add('visible');
    cinematic.setAttribute('aria-hidden','false');
    let i = 0;
    cineText.textContent = '';
    function next(){
      if(i >= messages.length){
        cinematic.classList.remove('visible');
        setTimeout(()=> { cinematic.style.display = 'none'; cinematic.setAttribute('aria-hidden','true'); }, 300);
        return;
      }
      cineText.style.opacity = '0';
      setTimeout(()=> {
        cineText.textContent = messages[i];
        cineText.style.transition = 'opacity .18s ease';
        cineText.style.opacity = '1';
        i++;
        setTimeout(next, interval);
      }, 160);
    }
    next();
  }

  // show portfolio (fade-in controlled by CSS .show)
  function showPortfolio(){
    // Hiện portfolio với fade-in (CSS sẽ điều khiển opacity)
    portfolioScreen.style.display = 'block';
    // force reflow / trigger transition
    void portfolioScreen.offsetWidth;
    portfolioScreen.classList.add('show');
    portfolioScreen.setAttribute('aria-hidden','false');
    window.scrollTo(0, 0);
  }

  // select handlers
  selectPy.addEventListener('click', ()=> {
    selection.classList.remove('visible');
    setTimeout(()=> {
      selection.style.display = 'none';
      showPortfolio();
    }, 420);
  });

  selectIron.addEventListener('click', ()=> {
    const msgs = [
      'IRON MAN SELECTED',
      'Checking availability...',
      "Tony Stark is currently unavailable.",
      'IRON MAN WILL RETURN.',
      "BUT TODAY'S HERO IS...",
      'PYLYLY'
    ];
    selection.classList.remove('visible');
    setTimeout(()=> {
      selection.style.display = 'none';
      playCinematic(msgs, 2500);
    }, 420);
    const total = msgs.length * 2500 + 400;
    setTimeout(()=> { showPortfolio(); }, total);
  });

  // keyboard access
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){
        const hero = card.getAttribute('data-hero');
        if(hero === 'pylyly') selectPy.click();
        else selectIron.click();
      }
    });
  });

})();
</script>
